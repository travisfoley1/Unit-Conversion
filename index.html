<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
      padding: 20px;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* Make interactive elements clickable (not draggable) */
    button, select, input, .no-drag { -webkit-app-region: no-drag; user-select: text; }

    .container { max-width: 820px; margin: 0 auto; }

    /* Titlebar spacer for frameless window */
    .titlebar-spacer { height: 28px; }

    .header { text-align: center; margin-bottom: 28px; }
    .header h1 {
      font-size: 26px; font-weight: 700;
      background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header p { color: #94a3b8; margin-top: 5px; font-size: 13px; }

    .pills { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 24px; }
    .pill {
      padding: 7px 14px; border-radius: 18px; border: none; cursor: pointer;
      font-size: 12.5px; font-weight: 500; transition: all 0.2s;
      background: rgba(255,255,255,0.06); color: #94a3b8;
    }
    .pill.active {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff;
      box-shadow: 0 4px 15px rgba(59,130,246,0.3);
    }

    .card {
      background: rgba(255,255,255,0.04); border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08); padding: 24px; margin-bottom: 18px;
    }

    .converter-row { display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
    .converter-col { flex: 1; min-width: 190px; }

    label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      color: #64748b; display: block; margin-bottom: 5px;
    }

    select {
      width: 100%; padding: 9px 11px; border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06); color: #e2e8f0;
      font-size: 13px; outline: none; margin-bottom: 8px;
    }
    select option { background: #1e293b; }

    input[type="number"] {
      width: 100%; padding: 11px 13px; border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08); color: #f8fafc;
      font-size: 20px; font-weight: 600; outline: none;
    }
    input[type="number"]:focus { border-color: rgba(59,130,246,0.4); }

    .result-box {
      width: 100%; padding: 11px 13px; border-radius: 9px; min-height: 48px;
      background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
      color: #60a5fa; font-size: 20px; font-weight: 600;
    }

    .swap-btn {
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06); color: #60a5fa;
      font-size: 18px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; margin-bottom: 6px;
    }
    .swap-btn:hover { background: rgba(59,130,246,0.15); }

    .toggle-btn {
      padding: 7px 18px; border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(139,92,246,0.15); color: #a78bfa;
      cursor: pointer; font-size: 12.5px; font-weight: 500;
    }

    .formula-card {
      background: rgba(139,92,246,0.06); border-radius: 14px;
      border: 1px solid rgba(139,92,246,0.15); padding: 22px; margin-bottom: 18px;
    }
    .formula-card h3 { font-size: 14px; color: #a78bfa; font-weight: 600; margin-bottom: 10px; }

    .formula-code {
      background: rgba(0,0,0,0.25); border-radius: 9px; padding: 14px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px; color: #c4b5fd; line-height: 1.7;
      overflow-x: auto; white-space: pre-wrap; word-break: break-word;
    }

    .formula-explain {
      margin-top: 12px; padding: 10px 14px;
      background: rgba(255,255,255,0.03); border-radius: 9px;
      font-size: 12.5px; color: #94a3b8; line-height: 1.6;
    }
    .formula-explain strong { color: #a78bfa; }

    .ref-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 7px; }
    .ref-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 12px; border-radius: 9px; cursor: pointer; transition: all 0.15s;
      background: rgba(255,255,255,0.02); border: 1px solid transparent;
    }
    .ref-item.active { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.3); }
    .ref-item span:first-child { font-size: 12.5px; color: #cbd5e1; }
    .ref-item span:last-child { font-size: 12.5px; font-weight: 600; color: #94a3b8; font-family: monospace; }
    .ref-item.active span:last-child { color: #60a5fa; }

    .key-formulas h3 { font-size: 14px; color: #f472b6; font-weight: 600; margin-bottom: 14px; }
    .key-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }
    .key-box { padding: 12px; background: rgba(255,255,255,0.02); border-radius: 9px; }
    .key-box .title { font-size: 11px; font-weight: 600; color: #f472b6; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .key-box .item { font-size: 12.5px; color: #94a3b8; line-height: 1.8; font-family: monospace; }

    .footer { text-align: center; margin-top: 20px; font-size: 11px; color: #475569; }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script>
    // ── Data ──
    const categories = {
      Length: {
        units: ["Meter","Kilometer","Centimeter","Millimeter","Micrometer","Nanometer","Mile","Yard","Foot","Inch","Nautical Mile","Fathom","Light Year"],
        toBase: { Meter:1, Kilometer:1000, Centimeter:0.01, Millimeter:0.001, Micrometer:1e-6, Nanometer:1e-9, Mile:1609.344, Yard:0.9144, Foot:0.3048, Inch:0.0254, "Nautical Mile":1852, Fathom:1.8288, "Light Year":9.461e15 },
        baseUnit: "Meter",
        explanation: "All length units convert through meters. Multiply by the 'to-base' factor, then divide by the target's factor."
      },
      Mass: {
        units: ["Kilogram","Gram","Milligram","Microgram","Metric Ton","Pound","Ounce","Stone","US Ton","Imperial Ton","Carat"],
        toBase: { Kilogram:1, Gram:0.001, Milligram:1e-6, Microgram:1e-9, "Metric Ton":1000, Pound:0.453592, Ounce:0.0283495, Stone:6.35029, "US Ton":907.185, "Imperial Ton":1016.05, Carat:0.0002 },
        baseUnit: "Kilogram",
        explanation: "All mass units convert through kilograms as the base SI unit."
      },
      Volume: {
        units: ["Liter","Milliliter","Cubic Meter","Cubic Centimeter","US Gallon","US Quart","US Pint","US Cup","US Fluid Ounce","US Tablespoon","US Teaspoon","Imperial Gallon","Imperial Pint","Imperial Fluid Ounce"],
        toBase: { Liter:1, Milliliter:0.001, "Cubic Meter":1000, "Cubic Centimeter":0.001, "US Gallon":3.78541, "US Quart":0.946353, "US Pint":0.473176, "US Cup":0.236588, "US Fluid Ounce":0.0295735, "US Tablespoon":0.0147868, "US Teaspoon":0.00492892, "Imperial Gallon":4.54609, "Imperial Pint":0.568261, "Imperial Fluid Ounce":0.0284131 },
        baseUnit: "Liter",
        explanation: "Volume units convert through liters. Note: US and Imperial measurements differ significantly (1 US gal ≈ 3.785 L vs 1 Imp gal ≈ 4.546 L)."
      },
      Area: {
        units: ["Square Meter","Square Kilometer","Square Centimeter","Square Millimeter","Hectare","Acre","Square Mile","Square Yard","Square Foot","Square Inch"],
        toBase: { "Square Meter":1, "Square Kilometer":1e6, "Square Centimeter":1e-4, "Square Millimeter":1e-6, Hectare:10000, Acre:4046.86, "Square Mile":2.59e6, "Square Yard":0.836127, "Square Foot":0.092903, "Square Inch":0.00064516 },
        baseUnit: "Square Meter",
        explanation: "Area units convert through square meters. Area factors are the square of their linear counterparts."
      },
      Temperature: {
        units: ["Celsius","Fahrenheit","Kelvin","Rankine"],
        special: true,
        explanation: "Temperature uses offset conversions, not simple ratios. Celsius and Kelvin differ by 273.15. Fahrenheit uses °F = °C × 9/5 + 32."
      },
      Speed: {
        units: ["Meters/Second","Kilometers/Hour","Miles/Hour","Knot","Feet/Second","Mach"],
        toBase: { "Meters/Second":1, "Kilometers/Hour":0.277778, "Miles/Hour":0.44704, Knot:0.514444, "Feet/Second":0.3048, Mach:343 },
        baseUnit: "Meters/Second",
        explanation: "Speed units convert through meters per second (m/s). Mach assumes speed of sound at sea level ≈ 343 m/s."
      },
      Pressure: {
        units: ["Pascal","Kilopascal","Bar","PSI","Atmosphere","Torr","mmHg"],
        toBase: { Pascal:1, Kilopascal:1000, Bar:100000, PSI:6894.76, Atmosphere:101325, Torr:133.322, mmHg:133.322 },
        baseUnit: "Pascal",
        explanation: "Pressure units convert through Pascals (Pa). 1 atm = 101,325 Pa = 14.696 PSI = 760 mmHg."
      },
      Energy: {
        units: ["Joule","Kilojoule","Calorie","Kilocalorie","Watt-Hour","Kilowatt-Hour","Electronvolt","BTU","Foot-Pound"],
        toBase: { Joule:1, Kilojoule:1000, Calorie:4.184, Kilocalorie:4184, "Watt-Hour":3600, "Kilowatt-Hour":3.6e6, Electronvolt:1.602e-19, BTU:1055.06, "Foot-Pound":1.35582 },
        baseUnit: "Joule",
        explanation: "Energy units convert through Joules (J). A food 'Calorie' is actually a kilocalorie = 4,184 J."
      },
      Time: {
        units: ["Second","Millisecond","Microsecond","Nanosecond","Minute","Hour","Day","Week","Month (30d)","Year (365d)"],
        toBase: { Second:1, Millisecond:0.001, Microsecond:1e-6, Nanosecond:1e-9, Minute:60, Hour:3600, Day:86400, Week:604800, "Month (30d)":2592000, "Year (365d)":31536000 },
        baseUnit: "Second",
        explanation: "Time units convert through seconds. Month and year use approximate averages."
      },
      "Data Storage": {
        units: ["Bit","Byte","Kilobyte","Megabyte","Gigabyte","Terabyte","Petabyte","Kibibyte","Mebibyte","Gibibyte","Tebibyte"],
        toBase: { Bit:0.125, Byte:1, Kilobyte:1000, Megabyte:1e6, Gigabyte:1e9, Terabyte:1e12, Petabyte:1e15, Kibibyte:1024, Mebibyte:1048576, Gibibyte:1073741824, Tebibyte:1099511627776 },
        baseUnit: "Byte",
        explanation: "SI prefixes use powers of 10 (1 KB = 1000 B), binary prefixes use powers of 2 (1 KiB = 1024 B)."
      }
    };

    const icons = { Length:"📏", Mass:"⚖️", Volume:"🧪", Area:"📐", Temperature:"🌡️", Speed:"💨", Pressure:"🔵", Energy:"⚡", Time:"⏱️", "Data Storage":"💾" };

    // ── State ──
    let state = { category: "Length", fromUnit: "Meter", toUnit: "Foot", value: "1", showFormula: true };

    // ── Conversion logic ──
    function convertTemp(val, from, to) {
      let c;
      if (from === "Celsius") c = val;
      else if (from === "Fahrenheit") c = (val - 32) * 5 / 9;
      else if (from === "Kelvin") c = val - 273.15;
      else c = (val - 491.67) * 5 / 9;
      if (to === "Celsius") return c;
      if (to === "Fahrenheit") return c * 9 / 5 + 32;
      if (to === "Kelvin") return c + 273.15;
      return c * 9 / 5 + 491.67;
    }

    function convert(val, cat, from, to) {
      if (from === to) return val;
      if (cat.special) return convertTemp(val, from, to);
      return val * cat.toBase[from] / cat.toBase[to];
    }

    function formatNum(n) {
      if (n === 0) return "0";
      if (Math.abs(n) >= 1e15 || (Math.abs(n) < 1e-6 && n !== 0)) return n.toExponential(6);
      if (Number.isInteger(n)) return n.toLocaleString();
      return parseFloat(n.toPrecision(10)).toString();
    }

    function getFormula(from, to, val, cat) {
      if (cat.special) {
        const r = convertTemp(val, from, to).toFixed(6);
        const formulas = {
          "Celsius→Fahrenheit": `°F = (°C × 9/5) + 32 = (${val} × 1.8) + 32 = ${r}`,
          "Fahrenheit→Celsius": `°C = (°F − 32) × 5/9 = (${val} − 32) × 0.5556 = ${r}`,
          "Celsius→Kelvin": `K = °C + 273.15 = ${val} + 273.15 = ${r}`,
          "Kelvin→Celsius": `°C = K − 273.15 = ${val} − 273.15 = ${r}`,
          "Fahrenheit→Kelvin": `K = (°F − 32) × 5/9 + 273.15 = ${r}`,
          "Kelvin→Fahrenheit": `°F = (K − 273.15) × 9/5 + 32 = ${r}`,
          "Celsius→Rankine": `°R = (°C × 9/5) + 491.67 = ${r}`,
          "Rankine→Celsius": `°C = (°R − 491.67) × 5/9 = ${r}`,
          "Fahrenheit→Rankine": `°R = °F + 459.67 = ${val} + 459.67 = ${r}`,
          "Rankine→Fahrenheit": `°F = °R − 459.67 = ${val} − 459.67 = ${r}`,
          "Kelvin→Rankine": `°R = K × 9/5 = ${val} × 1.8 = ${r}`,
          "Rankine→Kelvin": `K = °R × 5/9 = ${val} × 0.5556 = ${r}`,
        };
        return formulas[`${from}→${to}`] || `${val} ${from} = ${r} ${to}`;
      }
      const f1 = cat.toBase[from], f2 = cat.toBase[to];
      const result = (val * f1 / f2).toFixed(6);
      return `${val} ${from} × (${f1} ${cat.baseUnit} / 1 ${from}) × (1 ${to} / ${f2} ${cat.baseUnit}) = ${result} ${to}`;
    }

    // ── Render ──
    function render() {
      const cat = categories[state.category];
      const v = parseFloat(state.value);
      const result = isNaN(v) ? null : convert(v, cat, state.fromUnit, state.toUnit);
      const formula = (!isNaN(v) && state.fromUnit !== state.toUnit) ? getFormula(state.fromUnit, state.toUnit, v, cat) : null;

      let html = `<div class="titlebar-spacer"></div>`;

      // Header
      html += `<div class="header"><h1>Universal Unit Converter</h1><p>Metric, Imperial & Scientific — with full math breakdowns</p></div>`;

      // Category pills
      html += `<div class="pills">`;
      for (const c of Object.keys(categories)) {
        html += `<button class="pill no-drag ${c === state.category ? 'active' : ''}" onclick="selectCategory('${c}')">${icons[c]} ${c}</button>`;
      }
      html += `</div>`;

      // Converter
      html += `<div class="card"><div class="converter-row">`;
      // From
      html += `<div class="converter-col"><label>From</label><select onchange="setFrom(this.value)">`;
      for (const u of cat.units) html += `<option value="${u}" ${u === state.fromUnit ? 'selected' : ''}>${u}</option>`;
      html += `</select><input type="number" value="${state.value}" oninput="setVal(this.value)" placeholder="Enter value"></div>`;
      // Swap
      html += `<div style="display:flex;align-items:center;padding-bottom:6px"><button class="swap-btn no-drag" onclick="swap()">⇄</button></div>`;
      // To
      html += `<div class="converter-col"><label>To</label><select onchange="setTo(this.value)">`;
      for (const u of cat.units) html += `<option value="${u}" ${u === state.toUnit ? 'selected' : ''}>${u}</option>`;
      html += `</select><div class="result-box">${result !== null ? formatNum(result) : '—'}</div></div>`;
      html += `</div></div>`;

      // Formula toggle
      html += `<div style="display:flex;justify-content:center;margin-bottom:14px"><button class="toggle-btn no-drag" onclick="toggleFormula()">${state.showFormula ? '🔢 Hide' : '🔢 Show'} Math & Formulas</button></div>`;

      // Formula card
      if (state.showFormula && formula) {
        html += `<div class="formula-card"><h3>📐 Conversion Formula</h3>`;
        html += `<div class="formula-code">${formula}</div>`;
        html += `<div class="formula-explain"><strong>How it works:</strong> ${cat.explanation}</div></div>`;
      }

      // Quick reference
      html += `<div class="card"><h3 style="font-size:14px;color:#60a5fa;font-weight:600;margin-bottom:14px">📊 Quick Reference: 1 ${state.fromUnit} in other ${state.category} units</h3><div class="ref-grid">`;
      for (const u of cat.units) {
        if (u === state.fromUnit) continue;
        const cv = convert(1, cat, state.fromUnit, u);
        html += `<div class="ref-item no-drag ${u === state.toUnit ? 'active' : ''}" onclick="setTo('${u}')"><span>${u}</span><span>${formatNum(cv)}</span></div>`;
      }
      html += `</div></div>`;

      // Key formulas
      const keyData = [
        { title:"Length", items:["1 mile = 5,280 feet = 1,609.344 m","1 inch = 2.54 cm (exact)","1 yard = 3 feet = 0.9144 m","1 nautical mile = 1,852 m"] },
        { title:"Volume", items:["1 US gal = 4 qt = 8 pt = 128 fl oz","1 liter = 1,000 mL = 1,000 cm³","1 US gal ≈ 3.785 L","1 Imp gal ≈ 4.546 L ≈ 1.2 US gal"] },
        { title:"Mass", items:["1 lb = 16 oz = 453.592 g","1 stone = 14 lb ≈ 6.35 kg","1 metric ton = 1,000 kg ≈ 2,204.6 lb","1 US ton = 2,000 lb ≈ 907.2 kg"] },
        { title:"Temperature", items:["°F = °C × 9/5 + 32","°C = (°F − 32) × 5/9","K = °C + 273.15","°R = °F + 459.67"] },
        { title:"Energy", items:["1 cal = 4.184 J (exact)","1 kWh = 3,600,000 J","1 BTU ≈ 1,055 J","1 food Cal = 1 kcal = 4,184 J"] },
        { title:"Pressure / Speed", items:["1 atm = 101,325 Pa = 14.696 PSI","1 bar = 100,000 Pa","Mach 1 ≈ 343 m/s at sea level","1 knot = 1 nautical mile/hour"] },
      ];
      html += `<div class="card key-formulas"><h3>📖 Key Formulas & Relationships</h3><div class="key-grid">`;
      for (const g of keyData) {
        html += `<div class="key-box"><div class="title">${g.title}</div>`;
        for (const item of g.items) html += `<div class="item">${item}</div>`;
        html += `</div>`;
      }
      html += `</div></div>`;

      html += `<div class="footer">10 categories · 100+ units · Full formula breakdowns</div>`;

      document.getElementById('app').innerHTML = html;
    }

    // ── Event handlers ──
    function selectCategory(c) {
      state.category = c;
      const units = categories[c].units;
      state.fromUnit = units[0];
      state.toUnit = units[1];
      state.value = "1";
      render();
    }
    function setFrom(u) { state.fromUnit = u; render(); }
    function setTo(u) { state.toUnit = u; render(); }
    function setVal(v) { state.value = v; render(); }
    function swap() { const t = state.fromUnit; state.fromUnit = state.toUnit; state.toUnit = t; render(); }
    function toggleFormula() { state.showFormula = !state.showFormula; render(); }

    render();
  </script>
</body>
</html>
